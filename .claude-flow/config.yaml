# Claude Flow V3 Runtime Configuration
# Generated: 2026-03-04T21:49:12.129Z

version: "3.0.0"

swarm:
  topology: hierarchical-mesh
  maxAgents: 20                        # OPT-003: was 15 (32 threads available)
  autoScale: true
  coordinationStrategy: consensus

memory:
  backend: hybrid
  enableHNSW: true
  persistPath: .claude-flow/data
  cacheSize: 2048                      # OPT-003: was 100/256 (187 GB RAM)
  # ADR-049: Self-Learning Memory
  learningBridge:
    enabled: true
    sonaMode: instant                  # OPT-004: was balanced (32 idle threads)
    confidenceDecayRate: 0.005
    accessBoostAmount: 0.06            # was 0.03 (faster reinforcement)
    consolidationThreshold: 5          # was 10 (CPU handles it in <1ms)
  memoryGraph:
    enabled: true
    pageRankDamping: 0.85
    maxNodes: 50000                    # OPT-005: was 5000 (187 GB RAM)
    similarityThreshold: 0.65          # OPT-006: was 0.8 (too strict, sparse graphs)
  agentdb:
    learningBatchSize: 128             # OPT-007: was 32
    learningTickInterval: 15000        # OPT-008: was 30000
  agentScopes:
    enabled: true
    defaultScope: project

neural:
  enabled: true
  modelPath: .claude-flow/neural
  flashAttention: true                 # OPT-015: enable Flash Attention
  maxModels: 5                         # allow concurrent models

hooks:
  enabled: true
  autoExecute: true

mcp:
  autoStart: false
  port: 3000
