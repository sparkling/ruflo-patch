storage: ./storage
uplinks: {}
packages:
  '@claude-flow-patch/*':
    access: $all
    publish: $all
  'ruflo-patch':
    access: $all
    publish: $all
  '**':
    access: $all
    publish: $all
auth:
  htpasswd:
